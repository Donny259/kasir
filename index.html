<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Barang</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
        }

        .hidden { display: none !important; }

        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 351px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: 0.3s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-link { background: none; color: var(--accent); padding: 5px; font-size: 0.9em; }

        #dashboard { display: flex; height: 100vh; }

        .sidebar {
            width: 250px;
            background: var(--primary);
            color: var(--text);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 1.2rem; }
        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: var(--secondary); border-left: 4px solid var(--accent); }
        .logout-btn { margin-top: auto; background: var(--danger); color: white; }

        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }

        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .qty-input { width: 60px; text-align: center; margin: 5px; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-container">
        <div id="login-box" class="auth-card">
            <h2>Masuk</h2>
            <input type="email" id="login-user" placeholder="Email (Gmail)">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">Login</button>
            <button class="btn-link" onclick="handleResetPassword()">Lupa Password?</button>
            <p>Belum punya akun? <a href="#" onclick="toggleAuth()">Daftar</a></p>
        </div>
        <div id="signup-box" class="auth-card hidden">
            <h2>Daftar Baru</h2>
            <input type="email" id="reg-user" placeholder="Email (Gmail)">
            <input type="password" id="reg-pass" placeholder="Buat Password">
            <button class="btn-primary" onclick="handleSignUp()">Sign Up</button>
            <p>Sudah punya akun? <a href="#" onclick="toggleAuth()">Login</a></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="sidebar">
            <h2>Sistem Penjualan</h2>
            <div class="nav-item active" onclick="showTab(event, 'katalog')">Katalog Item</div>
            <div class="nav-item" onclick="showTab(event, 'daftar-barang')">Daftar Barang (Order)</div>
            <div class="nav-item" onclick="showTab(event, 'hasil-penjualan')">Hasil Penjualan</div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="content">
            <div id="tab-katalog" class="tab-content">
                <div class="card">
                    <h3>Tambah/Edit Katalog</h3>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="item-name" placeholder="Nama Item">
                        <input type="number" id="item-price" placeholder="Harga">
                        <button class="btn-primary" style="width: auto;" onclick="addOrUpdateItem()">Simpan Item</button>
                    </div>
                    <table id="katalog-table">
                        <thead>
                            <tr>
                                <th>Nama Item</th>
                                <th>Harga</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="katalog-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-daftar-barang" class="tab-content hidden">
                <h3>Pilih Barang untuk Order</h3>
                <div id="order-grid" class="item-grid"></div>
            </div>

            <div id="tab-hasil-penjualan" class="tab-content hidden">
                <div class="card">
                    <h3>Rekap Penjualan</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Waktu</th>
                                <th>Detail Order</th>
                                <th>Total Bayar</th>
                            </tr>
                        </thead>
                        <tbody id="sales-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZU6qgOcXF5tRRmb41-WXdeQptMVfTPCU",
            authDomain: "kasir-d6127.firebaseapp.com",
            databaseURL: "https://kasir-d6127-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kasir-d6127",
            storageBucket: "kasir-d6127.firebasestorage.app",
            messagingSenderId: "190173543746",
            appId: "1:190173543746:web:266a2e79c9fb5223af1cdb",
            measurementId: "G-SNZYCMGV52"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let katalog = [];
        let editId = null;
        let currentUser = null;

        // --- Auth Functions ---
        window.toggleAuth = () => {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('signup-box').classList.toggle('hidden');
        };

        window.handleSignUp = async () => {
            const email = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Berhasil daftar!");
                window.toggleAuth();
            } catch (error) { alert(error.message); }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) { alert("Login gagal: " + error.message); }
        };

        window.handleLogout = () => {
            signOut(auth).then(() => location.reload());
        };

        window.handleResetPassword = async () => {
            const email = document.getElementById('login-user').value;
            if(!email) return alert("Masukkan email Anda.");
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Email reset terkirim!");
            } catch (error) { alert(error.message); }
        };

        window.showTab = (e, tabName) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            if (e) e.currentTarget.classList.add('active');
        };

        // --- Core Logic ---
        window.addOrUpdateItem = async () => {
            if(!currentUser) return;
            const name = document.getElementById('item-name').value;
            const priceVal = document.getElementById('item-price').value;
            if(!name || !priceVal) return alert("Isi data!");
            const price = parseInt(priceVal);

            try {
                if(editId) {
                    await update(ref(db, `users/${currentUser.uid}/katalog/${editId}`), { name, price });
                    editId = null;
                    alert("Update Berhasil!");
                } else {
                    const newRef = push(ref(db, `users/${currentUser.uid}/katalog`));
                    await set(newRef, { name, price });
                    alert("Simpan Berhasil!");
                }
                document.getElementById('item-name').value = "";
                document.getElementById('item-price').value = "";
            } catch (e) { alert("Error: " + e.message); }
        };

        window.editItem = (id) => {
            const item = katalog.find(x => x.id === id);
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-price').value = item.price;
            editId = id;
        };

        window.deleteItem = (id) => {
            if(!currentUser) return;
            if(confirm("Hapus item?")) remove(ref(db, `users/${currentUser.uid}/katalog/${id}`));
        };

        window.processOrder = async (id) => {
            if(!currentUser) return;
            const item = katalog.find(x => x.id === id);
            const qty = parseInt(document.getElementById('qty-'+id).value);
            try {
                await push(ref(db, `users/${currentUser.uid}/sales`), {
                    time: new Date().toLocaleString(),
                    detail: `${item.name} (${qty}x)`,
                    total: item.price * qty
                });
                alert("Order Berhasil!");
            } catch (e) { alert(e.message); }
        };

        function renderKatalog() {
            const body = document.getElementById('katalog-body');
            body.innerHTML = "";
            katalog.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${item.name}</td><td>Rp ${item.price.toLocaleString()}</td>
                    <td><button onclick="window.editItem('${item.id}')" style="width:auto; background:#f39c12; color:white">Edit</button>
                    <button onclick="window.deleteItem('${item.id}')" style="width:auto; background:var(--danger); color:white">Hapus</button></td>`;
                body.appendChild(tr);
            });
        }

        function renderOrderGrid() {
            const grid = document.getElementById('order-grid');
            grid.innerHTML = "";
            katalog.forEach(item => {
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `<h4>${item.name}</h4><p>Rp ${item.price.toLocaleString()}</p>
                    <input type="number" id="qty-${item.id}" value="1" min="1" class="qty-input">
                    <button class="btn-primary" onclick="window.processOrder('${item.id}')">Order</button>`;
                grid.appendChild(div);
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                
                // Sinkronisasi Katalog spesifik User
                onValue(ref(db, `users/${user.uid}/katalog`), (snap) => {
                    const data = snap.val();
                    katalog = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
                    renderKatalog(); renderOrderGrid();
                });
                
                // Sinkronisasi Sales spesifik User
                onValue(ref(db, `users/${user.uid}/sales`), (snap) => {
                    const data = snap.val();
                    const body = document.getElementById('sales-body');
                    body.innerHTML = "";
                    if(data) Object.values(data).reverse().forEach(s => {
                        body.innerHTML += `<tr><td>${s.time}</td><td>${s.detail}</td><td>Rp ${s.total.toLocaleString()}</td></tr>`;
                    });
                });
            } else {
                currentUser = null;
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
